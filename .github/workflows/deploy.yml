name: Deploy RabbitMQ Config

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script: |
            cd /home/corvus/rabbitmq-config-corvus
            git checkout main
            git pull origin main
            cd /home/corvus/orchestration-back-corvus
            docker compose up --build -d rabbitmq
